name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Default least-privilege. Each job declares what it actually needs.
permissions: {}

jobs:
  verify:
    name: Verify (Ubuntu)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config autoconf automake libtool libtool-bin gettext autopoint \
            libglib2.0-dev libdbus-1-dev \
            libcups2-dev cups \
            libavahi-common-dev libavahi-client-dev

      - name: Build and install cpdb-libs
        run: |
          git clone --depth=1 https://github.com/OpenPrinting/cpdb-libs.git ~/cpdb-libs
          cd ~/cpdb-libs
          ./autogen.sh || autoreconf -fi
          ./configure --prefix=/usr
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        env:
          LD_LIBRARY_PATH: /usr/lib:/usr/local/lib
        run: cargo test --all --verbose

      - name: Verify tag matches Cargo.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.+)".*/\1/')
          if [ "$tag" != "$crate" ]; then
            echo "Tag $tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi

  publish:
    name: Publish to crates.io (Trusted Publishing)
    needs: verify
    runs-on: ubuntu-latest
    # `id-token: write` is REQUIRED for crates.io Trusted Publishing.
    # The crates-io-auth-action exchanges the workflow's OIDC identity
    # for a short-lived (~30 minute), auto-revoked crates.io API token.
    # No long-lived secret is read or stored.
    permissions:
      id-token: write
      contents: read
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config autoconf automake libtool libtool-bin gettext autopoint \
            libglib2.0-dev libdbus-1-dev \
            libcups2-dev cups \
            libavahi-common-dev libavahi-client-dev

      - name: Build and install cpdb-libs
        run: |
          git clone --depth=1 https://github.com/OpenPrinting/cpdb-libs.git ~/cpdb-libs
          cd ~/cpdb-libs
          ./autogen.sh || autoreconf -fi
          ./configure --prefix=/usr
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish cpdb-sys to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          LD_LIBRARY_PATH: /usr/lib:/usr/local/lib
        run: |
          VER=$(grep -m1 '^version' cpdb-sys/Cargo.toml | sed -E 's/.*"(.+)".*/\1/')
          if cargo search cpdb-sys --limit 1 | grep -q "cpdb-sys = \"$VER\""; then
            echo "cpdb-sys $VER already published, skipping"
          else
            cargo publish -p cpdb-sys --verbose
          fi

      - name: Publish cpdb-rs to crates.io (with retry for index propagation)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          LD_LIBRARY_PATH: /usr/lib:/usr/local/lib
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.+)".*/\1/')
          if cargo search cpdb-rs --limit 1 | grep -q "cpdb-rs = \"$VER\""; then
            echo "cpdb-rs $VER already published, skipping"
            exit 0
          fi

          for i in {1..5}; do
            if cargo publish -p cpdb-rs --verbose; then
              echo "Successfully published cpdb-rs!"
              exit 0
            fi
            echo "Publish failed (likely waiting for cpdb-sys index propagation). Retrying in 15 seconds..."
            sleep 15
          done
          echo "Failed to publish cpdb-rs after 5 attempts."
          exit 1

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog section for this tag
        id: notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          # Pull the section between this version's heading and the next ## heading.
          awk -v ver="$tag" '
            BEGIN { capture = 0 }
            /^## \[/ {
              if (capture) exit
              if ($0 ~ "\\[" ver "\\]" || $0 ~ "\\[Unreleased\\]") capture = 1
              next
            }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for v$tag" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
